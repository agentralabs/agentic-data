  <rect x="324" y="258" width="154" height="34" fill="#111111"/>
  <text x="338" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ea580c" font-weight="700">16 FORMATS</text>
  <rect x="494" y="258" width="154" height="34" fill="#111111"/>
  <text x="508" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ea580c" font-weight="700">24 INVENTIONS</text>
  <rect x="664" y="258" width="154" height="34" fill="#111111"/>
  <text x="678" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ea580c" font-weight="700">122 MCP TOOLS</text>
  <rect x="834" y="258" width="154" height="34" fill="#111111"/>
  <text x="848" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" font-weight="700">.ADAT FORMAT</text>

