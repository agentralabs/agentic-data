  <rect x="186" y="148" width="60" height="28" fill="none" stroke="#ea580c" stroke-width="2" rx="2"/>
  <text x="190" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#ea580c">ORDERS</text>

  <rect x="130" y="218" width="68" height="28" fill="none" stroke="#111111" stroke-width="2" rx="2"/>
  <text x="134" y="236" font-family="'JetBrains Mono', monospace" font-size="9" fill="#111111">PRODUCTS</text>

  <rect x="76" y="272" width="56" height="24" fill="none" stroke="#ea580c" stroke-width="2" rx="2"/>
  <text x="82" y="288" font-family="'JetBrains Mono', monospace" font-size="8" fill="#ea580c">LINEAGE</text>

  <rect x="190" y="272" width="56" height="24" fill="none" stroke="#111111" stroke-width="2" rx="2"/>
  <text x="196" y="288" font-family="'JetBrains Mono', monospace" font-size="8" fill="#111111">QUALITY</text>

  <!-- Edges -->
  <line x1="136" y1="170" x2="186" y2="162" stroke="#111111" stroke-width="2"/>
  <line x1="216" y1="176" x2="164" y2="218" stroke="#ea580c" stroke-width="2"/>
  <line x1="106" y1="184" x2="148" y2="218" stroke="#111111" stroke-width="2"/>
  <line x1="164" y1="246" x2="104" y2="272" stroke="#111111" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="164" y1="246" x2="218" y2="272" stroke="#111111" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Title -->
  <text x="324" y="136" font-family="'JetBrains Mono', monospace" font-size="54" fill="#111111" font-weight="700" letter-spacing="1">AGENTICDATA</text>
  <text x="324" y="172" font-family="'JetBrains Mono', monospace" font-size="18" fill="#ea580c" font-weight="700" letter-spacing="2">UNIVERSAL DATA COMPREHENSION ENGINE</text>
  <text x="324" y="210" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    Data comprehension is schema inference + lineage tracking + quality scoring.
  </text>
  <text x="324" y="234" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    16 format parsers, 24 inventions, 122 MCP tools. One portable .adat file.
  </text>

