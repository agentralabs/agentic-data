  <text x="220" y="340" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53">PARSERS: 16/16</text>
  <rect x="370" y="330" width="8" height="8" fill="#22c55e"/>
  <text x="390" y="340" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53">QUALITY: ARMED</text>
  <rect x="530" y="330" width="8" height="8" fill="#22c55e"/>
  <text x="550" y="340" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53">LINEAGE: TRACKING</text>
</svg>
