name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agentic-data-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agentic-data-darwin-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/adat dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/agentic-data-mcp dist/ 2>/dev/null || true
          cd dist && tar -czf ../${{ matrix.artifact }}.tar.gz *
      - uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}.tar.gz

  publish-crate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p agentic-data --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true
